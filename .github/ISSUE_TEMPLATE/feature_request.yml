name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
    - type: textarea
      id: problem
      attributes:
          label: Problem or motivation
          description: What problem does this solve, or what workflow does it improve?
      validations:
          required: true
    - type: textarea
      id: solution
      attributes:
          label: Proposed solution
          description: How would you like this to work?
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Other approaches you thought about and why they're less ideal.
      validations:
          required: false
