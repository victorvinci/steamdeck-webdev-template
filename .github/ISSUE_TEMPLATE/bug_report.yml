name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
    - type: textarea
      id: description
      attributes:
          label: Describe the bug
          description: A clear description of what went wrong.
      validations:
          required: true
    - type: textarea
      id: steps
      attributes:
          label: Steps to reproduce
          description: Minimal steps to trigger the bug.
          placeholder: |
              1. Run `npm run dev`
              2. Navigate to /
              3. Click ...
              4. See error in console
      validations:
          required: true
    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
          description: What should have happened instead?
      validations:
          required: true
    - type: textarea
      id: environment
      attributes:
          label: Environment
          description: Node version, OS, browser (if relevant).
          placeholder: |
              - Node: 24.15.0
              - OS: SteamOS 3.6 / Ubuntu 24.04 / macOS 15
              - Browser: Firefox 138
      validations:
          required: false
    - type: textarea
      id: logs
      attributes:
          label: Relevant logs or screenshots
          description: Paste error output, stack traces, or screenshots.
          render: shell
      validations:
          required: false
