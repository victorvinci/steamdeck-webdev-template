# Post-tag release automation.
#
# Fires when an annotated `X.Y.Z` tag lands on `main` (see
# `docs/RELEASE.md` step 8). Does three things, in order:
#
#   1. Extracts the matching `## [X.Y.Z]` section from CHANGELOG.md
#      via `scripts/extract-changelog-section.sh` (the same script
#      the release doc invokes as a manual fallback).
#   2. Generates a CycloneDX SBOM for the repo with anchore/sbom-action.
#      Gives downstream consumers a supply-chain manifest without
#      re-running scanners themselves.
#   3. Publishes a GitHub Release with the changelog section as notes
#      and the SBOM attached as an asset.
#
# If the CHANGELOG extraction fails or returns empty (someone forgot to
# promote `[Unreleased]` before tagging), the job falls back to GitHub's
# auto-generated notes so the release still publishes. A warning is
# logged so it gets fixed on the next cut.
#
# Action pinning policy:
#   See ci.yml header. Pins are SHA + `# vX` comment for Renovate.

name: Release

on:
    push:
        tags:
            # Numeric SemVer tags only (no leading `v`). Brackets are
            # supported in `on.push.tags` filter patterns; `[0-9]*` matches
            # anything starting with a digit, e.g. `1.0.0`, `0.3.0-rc.1`.
            # The "Verify tag commit is on main" guard below catches any
            # accidental triggers from non-release tags pushed elsewhere.
            - '[0-9]*'

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    release:
        name: publish github release
        runs-on: ubuntu-latest
        timeout-minutes: 10
        # `contents: write` is required to create the release and upload
        # assets. `id-token: write` + `attestations: write` are required by
        # actions/attest-build-provenance to mint an OIDC token and write
        # the resulting attestation to the repo's attestation store. No
        # other scopes needed — we don't push, comment, or touch issues
        # from this workflow.
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  # SBOM generator walks the lockfile; shallow clone is
                  # enough, but anchore/sbom-action internally runs `git
                  # ls-files` on some modes. Matches ci.yml's policy.
                  fetch-depth: 1

            - name: Verify tag commit is on main
              # Defence-in-depth against a typo'd or mis-targeted tag.
              # docs/RELEASE.md only sanctions tags cut from main, but
              # `on.push.tags` fires on any `[0-9]*` tag pushed to any ref.
              # This step asks GitHub whether the tagged commit is
              # reachable from `main`; if not, the release is aborted
              # before SBOM/notes work runs.
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ github.ref_name }}
                  SHA: ${{ github.sha }}
              run: |
                  set -euo pipefail
                  echo "Tag $TAG points at $SHA — checking it is on main."
                  if ! gh api "repos/${GITHUB_REPOSITORY}/compare/main...${SHA}" \
                      --jq '.status' | grep -qE '^(identical|behind)$'; then
                      echo "::error::Tag $TAG ($SHA) is not on main. Refusing to publish." >&2
                      exit 1
                  fi
                  echo "Tag is on main. Proceeding."

            - name: Extract CHANGELOG section
              id: notes
              env:
                  TAG: ${{ github.ref_name }}
              run: |
                  set -euo pipefail
                  VERSION="${TAG#v}"
                  echo "Version: $VERSION"
                  if ./scripts/extract-changelog-section.sh "$VERSION" > NOTES.md; then
                      if [ -s NOTES.md ]; then
                          echo "found=true" >> "$GITHUB_OUTPUT"
                          echo "Extracted $(wc -l < NOTES.md) lines of release notes."
                          exit 0
                      fi
                      echo "::warning::CHANGELOG section for $VERSION is empty — falling back to auto-generated notes."
                  else
                      echo "::warning::No CHANGELOG section for $VERSION — falling back to auto-generated notes."
                  fi
                  echo "found=false" >> "$GITHUB_OUTPUT"

            - name: Generate SBOM (CycloneDX)
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
              with:
                  # CycloneDX is the de-facto standard consumers expect
                  # from npm projects (Renovate, Dependabot, GH
                  # dependency graph all speak it).
                  format: cyclonedx-json
                  output-file: sbom.cdx.json
                  # Don't upload to the GH dependency-submission API —
                  # that's for non-package-manager builds (Maven, Go)
                  # where GH can't infer the graph. For npm projects
                  # GH already parses package-lock.json natively, so
                  # submitting a second source would create duplicate
                  # alerts.
                  upload-artifact: false
                  upload-release-assets: false

            # Build-provenance attestation for the SBOM.
            #
            # Generates a SLSA v1.0 provenance statement, signs it with a
            # Sigstore-issued certificate keyed to this workflow's OIDC
            # identity, and stores it in GitHub's attestation log so any
            # downstream consumer can prove the SBOM was produced by THIS
            # repo's release.yml on a tag pushed to main — not swapped in
            # by a compromised mirror or a tampered fork.
            #
            # Verify with:
            #   gh attestation verify sbom.cdx.json \
            #       --repo ${{ github.repository }}
            #
            # The source-tree itself is already covered by the signed git
            # tag plus branch-protection on main; the SBOM is the only
            # build artifact we ship that downstream consumers might
            # cache or mirror, so it's the artifact that actually needs
            # provenance.
            - name: Attest SBOM provenance
              uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
              with:
                  subject-path: sbom.cdx.json

            # GitHub's "Immutable releases" repo setting locks a release
            # the moment it's published — no asset uploads after that
            # point. softprops/action-gh-release@v2's default flow
            # (create-then-upload) hits this and fails on the SBOM
            # attach step. Workaround per the action's own error
            # message: create as a draft, attach assets while still
            # mutable, then flip draft→published in a follow-up step.
            # Both prerelease and final tags go through the same path
            # so the workflow stays uniform.
            - name: Create draft GitHub Release with SBOM
              uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
              with:
                  # Use the extracted notes when available; otherwise
                  # fall through to `generate_release_notes` which asks
                  # GitHub to diff against the previous tag.
                  body_path: ${{ steps.notes.outputs.found == 'true' && 'NOTES.md' || '' }}
                  generate_release_notes: ${{ steps.notes.outputs.found != 'true' }}
                  files: sbom.cdx.json
                  # The tag already exists (this workflow fires on tag
                  # push), so don't let the action try to re-create or
                  # move it.
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  # SemVer pre-release marker is the hyphen — `0.3.0-rc.2`,
                  # `1.0.0-beta.1`, etc. The action does not infer this from
                  # the tag name, so pass it explicitly. Clean tags
                  # (`0.3.0`, `1.0.0`) get `prerelease: false` and the
                  # standard release badge.
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  draft: true
                  fail_on_unmatched_files: true

            - name: Publish draft release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh release edit "${{ github.ref_name }}" --draft=false
