# CodeQL static analysis — GitHub's SAST, replacing the GitLab
# Security/SAST.gitlab-ci.yml template that shipped with the boilerplate.
#
# Dependency scanning is handled separately via GitHub-native Dependabot
# Alerts (enabled in repo settings, no workflow file needed).
# Secret scanning is handled separately via GitHub-native Secret Scanning
# (enabled in repo settings, no workflow file needed).

name: CodeQL

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
    schedule:
        - cron: '17 6 * * 1' # weekly, Monday early morning

jobs:
    analyze:
        name: Analyze (${{ matrix.language }})
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            security-events: write
        strategy:
            fail-fast: false
            matrix:
                language: [javascript-typescript]
        steps:
            - uses: actions/checkout@v4
            - uses: github/codeql-action/init@v3
              with:
                  languages: ${{ matrix.language }}
                  queries: security-and-quality
            - uses: github/codeql-action/analyze@v3
              with:
                  category: '/language:${{ matrix.language }}'
