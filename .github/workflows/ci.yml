# GitHub Actions CI for steamdeck-webdev-template
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   NX_CLOUD_ACCESS_TOKEN  — enables Nx Cloud remote cache + Self-Healing CI.
#                            Without it, nx-cloud calls no-op with a warning
#                            (pipeline still runs, no caching).
#
# Notes on GitHub equivalents for the old GitLab pipeline:
#   - CI_PIPELINE_SOURCE == merge_request_event → github.event_name == 'pull_request'
#   - CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH   → github.ref == 'refs/heads/main'
#   - CI_MERGE_REQUEST_DIFF_BASE_SHA            → github.event.pull_request.base.sha
#   - CI_MERGE_REQUEST_TITLE                    → github.event.pull_request.title
#   - Security/SAST template                    → .github/workflows/codeql.yml
#   - Security/Secret-Detection template        → GitHub-native Secret Scanning (repo setting)
#   - Security/Dependency-Scanning template     → Dependabot Alerts (repo setting) + Renovate

name: CI

on:
    push:
        branches: [main, develop]
    pull_request:

# Scheduled jobs (npm audit, future cron tasks) live in
# .github/workflows/ci-scheduled.yml so this file stays focused on
# push/PR gates.

# Cancel in-progress runs for the same PR / branch when new commits land.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

# Least-privilege default for GITHUB_TOKEN. Jobs override if they need more.
permissions:
    contents: read

env:
    HUSKY: '0'
    NX_BRANCH: ${{ github.head_ref || github.ref_name }}
    NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
    # ---------- quality ----------

    check:
        name: check (format / lint / typecheck / test)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: ./.github/actions/setup-node-deps

            # --- Diagnostic: dumps git identity and GitHub context so future
            # debugging of Nx Cloud attribution has the data inline. Safe to
            # keep — adds ~1s to the job and no secrets are printed.
            - name: Diagnostic (git + github context)
              run: |
                  echo "=== git identity check ==="
                  git --version || echo "git not installed"
                  git rev-parse HEAD || echo "no HEAD"
                  git log -1 --pretty=fuller || echo "git log failed"
                  echo "=== GITHUB_* context ==="
                  echo "github.event_name=${{ github.event_name }}"
                  echo "github.ref=${{ github.ref }}"
                  echo "github.sha=${{ github.sha }}"
                  echo "base_sha=${{ github.event.pull_request.base.sha }}"
                  echo "head_sha=${{ github.event.pull_request.head.sha }}"
                  echo "=== end diagnostic ==="

            - name: Start Nx Cloud CI run
              run: npx nx-cloud start-ci-run --no-distribution

            - run: npm run format:check

            - name: nx affected — lint / typecheck / test
              run: |
                  BASE="${{ github.event.pull_request.base.sha }}"
                  if [ -n "$BASE" ]; then
                    npx nx affected -t lint typecheck test --parallel=3 --base="$BASE" --head=HEAD
                  else
                    npx nx affected -t lint typecheck test --parallel=3 --base=HEAD~1
                  fi

            - name: Self-Healing CI (on failure)
              if: failure()
              run: npx nx fix-ci

    commitlint:
        name: commitlint (PR title)
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - name: Lint PR title
              env:
                  PR_TITLE: ${{ github.event.pull_request.title }}
              run: echo "$PR_TITLE" | npx --yes -p @commitlint/cli -p @commitlint/config-conventional commitlint --config commitlint.config.js

    attribution-guard:
        name: attribution guard
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Enforce CHANGELOG + attribution log updates
              env:
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
              run: |
                  CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD)
                  echo "$CHANGED"
                  if echo "$CHANGED" | grep -qE '^(apps|libs)/'; then
                    if ! echo "$CHANGED" | grep -q '^CHANGELOG.md$'; then
                      echo "ERROR: apps/ or libs/ changed but CHANGELOG.md was not updated." >&2
                      exit 1
                    fi
                    if ! echo "$CHANGED" | grep -q '^\.ai-attribution\.jsonl$'; then
                      echo "WARNING: apps/ or libs/ changed but .ai-attribution.jsonl was not appended to." >&2
                    fi
                  fi

    # ---------- build ----------

    build:
        name: build
        needs: check
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: ./.github/actions/setup-node-deps
            - name: nx affected — build
              run: |
                  BASE="${{ github.event.pull_request.base.sha }}"
                  if [ -n "$BASE" ]; then
                    npx nx affected -t build --parallel=3 --base="$BASE" --head=HEAD
                  else
                    npx nx affected -t build --parallel=3 --base=HEAD~1
                  fi
            - name: Self-Healing CI (on failure)
              if: failure()
              run: npx nx fix-ci
            - uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist
                  if-no-files-found: ignore
                  retention-days: 7

    storybook-build:
        name: storybook build
        needs: check
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: ./.github/actions/setup-node-deps
            - run: npx nx run frontend:build-storybook

    # ---------- e2e ----------

    e2e:
        name: e2e
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 30
        container:
            image: mcr.microsoft.com/playwright:v1.55.0-jammy
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            # actions/checkout sets safe.directory on the runner host, but this
            # job runs inside a container with its own git config — without this
            # step every git CLI call (including `nx affected`'s git diff) fails
            # with "dubious ownership".
            - name: Mark workspace as safe (container)
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
            - uses: ./.github/actions/setup-node-deps
            - name: nx affected — e2e
              run: |
                  BASE="${{ github.event.pull_request.base.sha }}"
                  if [ -n "$BASE" ]; then
                    npx nx affected -t e2e --parallel=1 --base="$BASE" --head=HEAD
                  else
                    npx nx affected -t e2e --parallel=1 --base=HEAD~1
                  fi
            - name: Self-Healing CI (on failure)
              if: failure()
              run: npx nx fix-ci
            - uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-reports
                  path: |
                      apps/frontend-e2e/playwright-report
                      apps/backend-e2e/playwright-report
                  retention-days: 7

    # ---------- report ----------

    lighthouse:
        name: lighthouse
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup-node-deps
            # The build job uses `if-no-files-found: ignore` on its dist
            # upload, so an affected-no-op push (CI-only changes) produces no
            # artifact. Tolerate the missing download and skip lhci cleanly
            # instead of leaving a red ❌ on the run.
            - uses: actions/download-artifact@v4
              id: dl-dist
              continue-on-error: true
              with:
                  name: dist
                  path: dist
            - name: Check for dist artifact
              id: check-dist
              run: |
                  if [ -d dist ] && [ -n "$(ls -A dist 2>/dev/null)" ]; then
                    echo "present=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "present=false" >> "$GITHUB_OUTPUT"
                    echo "No dist artifact — affected build was a no-op. Skipping lighthouse."
                  fi
            - if: steps.check-dist.outputs.present == 'true'
              run: npx --yes @lhci/cli@0.14.x autorun --config=./lighthouserc.json
            - if: always() && steps.check-dist.outputs.present == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: lighthouseci
                  path: .lighthouseci
                  retention-days: 14
