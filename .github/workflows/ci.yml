# GitHub Actions CI for steamdeck-webdev-template
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   NX_CLOUD_ACCESS_TOKEN  — enables Nx Cloud remote cache + Self-Healing CI.
#                            Without it, nx-cloud calls no-op with a warning
#                            (pipeline still runs, no caching).
#
# Notes on GitHub equivalents for the old GitLab pipeline:
#   - CI_PIPELINE_SOURCE == merge_request_event → github.event_name == 'pull_request'
#   - CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH   → github.ref == 'refs/heads/main'
#   - CI_MERGE_REQUEST_DIFF_BASE_SHA            → github.event.pull_request.base.sha
#   - CI_MERGE_REQUEST_TITLE                    → github.event.pull_request.title
#   - Security/SAST template                    → .github/workflows/codeql.yml
#   - Security/Secret-Detection template        → GitHub-native Secret Scanning (repo setting)
#   - Security/Dependency-Scanning template     → Dependabot Alerts (repo setting) + Renovate
#
# Action pinning policy:
#   Third-party (and first-party) actions are pinned to commit SHAs, not tags,
#   so a compromised tag in any upstream action repo can't silently swap code
#   into our pipeline. The `# vX.Y.Z` comment next to each pin is what Renovate
#   reads to bump the SHA — see `renovate.json` (`helpers:pinGitHubActionDigests`).

name: CI

on:
    push:
        branches: [main, develop]
        # Skip CI when only docs / metadata change. Files that affect builds
        # (package.json, .nvmrc, tsconfig*, .github/**, apps/**, libs/**, etc.)
        # are intentionally NOT in this list.
        paths-ignore:
            - '**.md'
            - 'LICENSE'
            - '.gitignore'
            - '.editorconfig'
            - '.vscode/**'
            - 'docs/**'
            # Standalone attribution-only pushes (the second commit of the
            # two-commit flow when pushed on its own) shouldn't burn a CI
            # run. Bundled pushes that touch real code alongside this file
            # still trigger CI because paths-ignore only skips when EVERY
            # changed path matches.
            - '.ai-attribution.jsonl'
    # No paths-ignore on PRs: when a PR touches only ignored paths, GitHub
    # skips the workflow entirely and `ci-pass` never posts, which leaves
    # branch protection stuck on "Waiting for status to be reported." The
    # detect job's `code` output gates the heavy jobs instead — docs-only
    # PRs pay only ~1 min (detect + ci-pass) while branch protection stays
    # unblocked. The push-to-main/develop block above still uses
    # paths-ignore because there's no branch-protection gate on pushes.
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

# Scheduled jobs (npm audit, license scan, outdated deps, bundle-size budget,
# stale branch sweep) live in .github/workflows/ci-scheduled.yml so this file
# stays focused on push/PR gates.

# Cancel in-progress runs for the same PR / branch when new commits land.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

# Least-privilege default for GITHUB_TOKEN. Jobs override if they need more.
permissions:
    contents: read

env:
    HUSKY: '0'
    NX_BRANCH: ${{ github.head_ref || github.ref_name }}
    # Kill switch for Nx Cloud. When the `NX_CLOUD_ENABLED` repo variable
    # is anything other than 'true' (e.g. we're out of free-plan credits),
    # set NX_NO_CLOUD=true so nx skips cloud entirely regardless of the
    # nxCloudId in nx.json. Blanking the token alone is not enough — nx
    # still tries to auth using the workspace's nxCloudId. Flip the
    # variable back to 'true' in repo Settings → Variables when credits
    # reset.
    NX_CLOUD_ACCESS_TOKEN: ${{ vars.NX_CLOUD_ENABLED == 'true' && secrets.NX_CLOUD_ACCESS_TOKEN || '' }}
    NX_NO_CLOUD: ${{ vars.NX_CLOUD_ENABLED == 'true' && 'false' || 'true' }}
    # Opt in to Node.js 24 for JavaScript actions ahead of the June 2026
    # forced cutover. Silences the "Node.js 20 actions are deprecated"
    # warning on every run. Remove once all pinned actions ship releases
    # that default to Node 24 natively.
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    # ---------- change detection ----------

    # Detects whether code or frontend-relevant paths changed in this push/PR.
    #
    # `code`     — gates all heavy jobs (check, build, e2e, commitlint).
    #              Docs-only PRs skip them and only pay for detect +
    #              attribution-guard + ci-pass (~1 min), keeping branch
    #              protection happy without burning free-tier minutes.
    # `frontend` — additionally gates storybook-build on backend-only changes.
    #
    # Note: `attribution-guard` intentionally runs on every non-draft PR
    # (not gated by `code`) — AI assistants can touch docs, workflows, or
    # configs and still owe a JSONL entry per CLAUDE.md.
    detect:
        name: detect changed paths
        runs-on: ubuntu-latest
        timeout-minutes: 3
        outputs:
            code: ${{ steps.filter.outputs.code }}
            frontend: ${{ steps.filter.outputs.frontend }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - id: filter
              uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
              with:
                  filters: |
                      code:
                        - 'apps/**'
                        - 'libs/**'
                        - 'package.json'
                        - 'package-lock.json'
                        - 'nx.json'
                        - 'tsconfig*.json'
                        - '.nvmrc'
                        - '.github/**'
                      frontend:
                        - 'apps/frontend/**'
                        - 'apps/frontend-e2e/**'
                        - 'libs/**'
                        - 'apps/frontend/.storybook/**'
                        - 'package.json'
                        - 'package-lock.json'
                        - 'nx.json'
                        - 'tsconfig*.json'
                        - '.nvmrc'

    # ---------- quality ----------

    check:
        name: check & build
        needs: detect
        # Skip on draft PRs and docs-only PRs (no code paths changed).
        # The `ready_for_review` trigger fires when the PR leaves draft,
        # so the full gate still runs before merge.
        #
        # Quality gates (format, lint, typecheck, test) and build are
        # merged into one job to avoid paying for a second checkout +
        # npm ci on a fresh runner (~1-2 min saved per run on free tier).
        if: >-
            needs.detect.outputs.code == 'true' &&
            (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0
            - uses: ./.github/actions/setup-node-deps

            - name: Start Nx Cloud CI run
              if: vars.NX_CLOUD_ENABLED == 'true'
              run: npx nx-cloud start-ci-run --no-distribution

            - run: npm run format:check

            - name: Resolve NX base
              id: nx-base
              uses: ./.github/actions/resolve-nx-base
              with:
                  pr-base: ${{ github.event.pull_request.base.sha }}
                  push-before: ${{ github.event.before }}

            - name: nx affected — lint / typecheck / test
              run: npx nx affected -t lint typecheck test --parallel=3 --base="${{ steps.nx-base.outputs.base }}" --head=HEAD

            - name: nx affected — build
              run: npx nx affected -t build --parallel=3 --base="${{ steps.nx-base.outputs.base }}" --head=HEAD

            - name: Self-Healing CI (on failure)
              if: failure()
              run: npx nx fix-ci

            - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: dist
                  path: dist
                  if-no-files-found: ignore
                  retention-days: 7

    commitlint:
        name: commitlint (PR title)
        needs: detect
        if: >-
            needs.detect.outputs.code == 'true' &&
            github.event_name == 'pull_request' &&
            github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: ./.github/actions/setup-node-deps
            - name: Lint PR title
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  LATEST_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title -q .title)
                  CLEAN_TITLE=$(echo "$LATEST_TITLE" | sed 's/^\[WIP\] //g')
                  echo "$CLEAN_TITLE" | npx commitlint --config commitlint.config.js

    attribution-guard:
        name: attribution guard
        # Runs on every non-draft PR — AI commits can touch any path
        # (docs, workflows, configs), not just apps/libs, and all of those
        # require a JSONL entry per CLAUDE.md. The CHANGELOG check inside
        # the script still only fires on apps/libs changes.
        if: >-
            github.event_name == 'pull_request' &&
            github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0
            - name: Enforce CHANGELOG + attribution log updates
              env:
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
                  # AI assistant Co-Authored-By patterns. Matches commits
                  # where an AI pair-programmer contributed code — NOT
                  # automation bots like dependabot/renovate/github-actions
                  # (those do dep/ops automation, not code authorship, and
                  # don't need JSONL entries). Extend this list as new
                  # assistants are adopted — use a name prefix that appears
                  # in the trailer's identifier portion.
                  AI_TRAILER_REGEX: 'Co-Authored-By:[[:space:]]+(claude-|Claude[[:space:]]*<noreply@anthropic|gpt-[0-9]|openai-|gemini-|(github-)?copilot([-[]|[[:space:]])|cursor([-[]|[[:space:]])|devin([-[]|[[:space:]])|codex-)'
              run: |
                  set -euo pipefail

                  CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD)
                  echo "=== Changed files ==="
                  echo "$CHANGED"

                  # Check 1 — CHANGELOG update when code changes.
                  if echo "$CHANGED" | grep -qE '^(apps|libs)/'; then
                    if ! echo "$CHANGED" | grep -q '^CHANGELOG.md$'; then
                      echo "ERROR: apps/ or libs/ changed but CHANGELOG.md was not updated." >&2
                      exit 1
                    fi
                  fi

                  # Check 2 — AI-attribution integrity. For every commit in
                  # the PR that carries an AI Co-Authored-By trailer, the
                  # PR must contain a net-new line in .ai-attribution.jsonl.
                  # One entry can cover multiple work commits, so we don't
                  # require a 1:1 match — just that *some* entry was added.
                  AI_COMMITS=$(git log --format='%H %s' "$BASE_SHA"..HEAD --no-merges --extended-regexp --grep="$AI_TRAILER_REGEX" || true)
                  if [ -n "$AI_COMMITS" ]; then
                    echo "=== AI-assistant commits in this PR ==="
                    echo "$AI_COMMITS"

                    # Count added lines in .ai-attribution.jsonl (ignore
                    # deletions and context; only net appends count).
                    ADDED=$(git diff --numstat "$BASE_SHA"...HEAD -- .ai-attribution.jsonl | awk '{print $1}')
                    ADDED=${ADDED:-0}
                    echo "Net new .ai-attribution.jsonl lines: $ADDED"

                    if [ "$ADDED" -eq 0 ]; then
                      echo "ERROR: AI-assistant Co-Authored-By trailers detected on commits above, but .ai-attribution.jsonl has no new entries in this PR." >&2
                      echo "Append one JSONL line per CLAUDE.md and push it as an attribution commit." >&2
                      exit 1
                    fi
                  fi

    # Blocks PRs that INTRODUCE a dep with a known high/critical advisory.
    # Dependabot Alerts fire post-merge — this catches it at PR time, before
    # the vulnerable version lands on develop/main. Summary is posted as a PR
    # comment only on failure (`on-failure`), so clean PRs stay quiet.
    # Free on public repos; runs against the PR's head vs base ref.
    dependency-review:
        name: dependency review
        needs: detect
        if: >-
            needs.detect.outputs.code == 'true' &&
            github.event_name == 'pull_request' &&
            github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        timeout-minutes: 3
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
              with:
                  fail-on-severity: high
                  comment-summary-in-pr: on-failure

    storybook-build:
        name: storybook build
        needs: [check, detect]
        # PR-only: on push-to-main/develop the PR already ran this check before
        # the squash-merge landed — a second run would just re-burn the minutes.
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && needs.detect.outputs.frontend == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0
            - uses: ./.github/actions/setup-node-deps
            - run: npx nx run frontend:build-storybook

    # ---------- e2e ----------

    e2e:
        name: e2e
        needs: [detect, check]
        # PR-only: e2e already ran on the PR before the squash-merge landed,
        # so skipping on push-to-main/develop avoids double-counting ~10 min of
        # Playwright + MySQL runtime against the monthly free-tier budget.
        # Also skipped on docs-only PRs (no code paths changed).
        if: >-
            needs.detect.outputs.code == 'true' &&
            github.event_name == 'pull_request' &&
            github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        timeout-minutes: 30
        container:
            image: mcr.microsoft.com/playwright:v1.59.1-jammy
            # Firefox refuses to launch inside the GHA container without
            # SYS_ADMIN — its sandbox needs user-namespace clone() which
            # the default seccomp profile blocks. This is the workaround
            # documented in Playwright's "Run in CI" guide.
            options: --cap-add=SYS_ADMIN
        services:
            # Real MySQL for backend-e2e (asserts /api/health → db: connected
            # and reads seeded users from /api/users) and frontend-e2e (which
            # exercises the same users-from-backend flow). Service containers
            # share the job network when the job runs inside a container, so
            # the backend reaches it at hostname `mysql`.
            mysql:
                image: mysql:8.4
                env:
                    MYSQL_DATABASE: app
                    MYSQL_USER: app
                    MYSQL_PASSWORD: app
                    MYSQL_ROOT_PASSWORD: app
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping -h localhost -u root -papp"
                    --health-interval=5s
                    --health-timeout=5s
                    --health-retries=20
        env:
            # Bind backend to 0.0.0.0 instead of the schema's default
            # 'localhost'. On Node 20+ inside the Playwright image,
            # 'localhost' resolves IPv6-first (::1) so app.listen binds
            # only to ::1, but backend-e2e's waitForPortOpen checks
            # 127.0.0.1 → ECONNREFUSED until it times out. Binding to
            # 0.0.0.0 covers both stacks.
            HOST: 0.0.0.0
            # Firefox refuses to launch when $HOME isn't owned by the
            # current user. Inside the Playwright container the runner
            # mounts the workspace under a UID that doesn't own root's
            # HOME — Playwright's documented workaround is to pin HOME
            # to /root for the job.
            HOME: /root
            DB_HOST: mysql
            DB_PORT: '3306'
            DB_NAME: app
            DB_USER: app
            DB_PASSWORD: app
            FRONTEND_URL: http://localhost:4200
            # Vite inlines VITE_* at build time; without it the frontend
            # Zod env validation in apps/frontend/src/lib/env.ts throws on
            # first script eval and the page never paints (Playwright then
            # fails the users-list test, lighthouse fails with NO_FCP).
            VITE_API_URL: http://localhost:3000
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0
            # actions/checkout sets safe.directory on the runner host, but this
            # job runs inside a container with its own git config — without this
            # step every git CLI call (including `nx affected`'s git diff) fails
            # with "dubious ownership".
            - name: Mark workspace as safe (container)
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
            - uses: ./.github/actions/setup-node-deps
            # The Playwright image doesn't ship a mysql client (needed to
            # load db/schema.sql into the service container before the
            # backend boots) or lsof (used by backend-e2e's globalTeardown
            # to free port 3000 — without it the teardown logs a noisy
            # "lsof: not found" warning, harmless but noisy).
            #
            # Low priority: a custom Docker image (extending Playwright +
            # mysql-client + lsof, hosted on GHCR) would save ~30s per e2e
            # run. Not worth the maintenance overhead until e2e runs daily.
            - name: Install mysql client and lsof
              run: |
                  apt-get update
                  apt-get install -y --no-install-recommends default-mysql-client lsof
            - name: Load schema and seed data
              env:
                  MYSQL_PWD: app
              run: mysql -h mysql -u app app < db/schema.sql
            - name: Resolve NX base
              id: nx-base
              uses: ./.github/actions/resolve-nx-base
              with:
                  pr-base: ${{ github.event.pull_request.base.sha }}
                  push-before: ${{ github.event.before }}
            - name: nx affected — e2e
              run: npx nx affected -t e2e --parallel=1 --base="${{ steps.nx-base.outputs.base }}" --head=HEAD
            - name: Self-Healing CI (on failure)
              if: failure()
              run: npx nx fix-ci
            - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              if: failure()
              with:
                  name: playwright-reports
                  path: |
                      apps/frontend-e2e/playwright-report
                      apps/backend-e2e/playwright-report
                  retention-days: 7

    # Lighthouse moved to .github/workflows/ci-scheduled.yml (weekly cron).
    # It was non-blocking (continue-on-error) and therefore wasn't gating
    # anything on PRs — running it on every push was pure minute burn. The
    # weekly run still surfaces perf regressions via a tracking issue.

    # ---------- aggregate status ----------
    #
    # Single "everything required is green" check for branch protection. Point
    # the protected branch's required status checks at `ci-pass` only, and you
    # can rename or reshuffle the jobs above without touching branch protection
    # settings. The job passes when every upstream job either succeeded or was
    # intentionally skipped (e.g. storybook-build on a backend-only PR, e2e on
    # push-to-main). It fails loudly if any upstream job failed or was
    # cancelled — that's what `contains(... 'failure', 'cancelled')` catches.
    ci-pass:
        name: ci pass
        if: always()
        needs:
            - detect
            - check
            - storybook-build
            - e2e
            - commitlint
            - attribution-guard
            - dependency-review
        runs-on: ubuntu-latest
        timeout-minutes: 2
        # No `environment:` here — a prior version gated ci-pass behind
        # an `environment: main` approval to act as a pre-merge deploy
        # gate. That rule was removed (see docs/RELEASE.md → "Things
        # this flow deliberately avoids") because it created a chicken-
        # and-egg with the post-merge pages.yml deploy. The deployment
        # still happens on push-to-main via pages.yml; ci-pass only has
        # to report green/red for branch protection.
        steps:
            - name: Verify no upstream job failed or was cancelled
              env:
                  RESULTS: ${{ toJSON(needs) }}
              run: |
                  echo "$RESULTS"
                  if echo "$RESULTS" | grep -Eq '"result": "(failure|cancelled)"'; then
                      echo "One or more required jobs failed or were cancelled." >&2
                      exit 1
                  fi
                  echo "All required jobs succeeded or were skipped."
