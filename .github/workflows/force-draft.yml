name: PR Setup
on:
    pull_request:
        types: [opened]

jobs:
    initialize-pr:
        name: Convert to Draft and Set Title
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - name: PR Automation
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  ORIGINAL_TITLE: ${{ github.event.pull_request.title }}
              run: |
                  # 1. Convert to Draft (prevents heavy CI from running)
                  gh pr ready "$PR_URL" --undo

                  # 2. Update Title (Prefixes current title with [WIP])
                  # Note: If it already has [WIP], it won't add it again
                  if [[ ! "$ORIGINAL_TITLE" =~ ^\[WIP\] ]]; then
                    gh pr edit "$PR_URL" --title "[WIP] $ORIGINAL_TITLE"
                  fi
