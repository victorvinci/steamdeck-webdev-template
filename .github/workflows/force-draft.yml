# Convert newly-opened PRs to draft so the CI gates in ci.yml (which skip
# on draft) don't burn minutes until the author explicitly marks the PR
# ready for review.
#
# Uses pull_request_target so the GITHUB_TOKEN has write scope on PRs from
# forks as well as same-repo branches. This workflow only reads metadata
# and calls `gh pr ready --undo` — it never checks out PR head code, so
# running in the base-repo context is safe.
name: Force Draft

on:
    pull_request_target:
        types: [opened]

permissions:
    pull-requests: write

jobs:
    convert-to-draft:
        name: Convert PR to Draft
        runs-on: ubuntu-latest
        timeout-minutes: 2
        # Skip PRs that were already opened as draft (gh pr ready --undo
        # would error) and PRs opened by bots (dependabot, renovate) — we
        # want their automated PRs to run CI immediately.
        if: >-
            github.event.pull_request.draft == false &&
            github.event.pull_request.user.type != 'Bot'
        steps:
            - name: Mark PR as draft
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
              run: gh pr ready "$PR_URL" --undo
