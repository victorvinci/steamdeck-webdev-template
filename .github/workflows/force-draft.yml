name: PR Setup
on:
    pull_request:
        types: [opened]

permissions:
    pull-requests: write
    contents: read

jobs:
    initialize-pr:
        name: Convert to Draft and Set Title
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - name: PR Automation
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  ORIGINAL_TITLE: ${{ github.event.pull_request.title }}
              run: |
                  # 1. Convert to Draft (prevents heavy CI from running)
                  gh pr ready "$PR_URL" --undo

                    # 2. Update Title (Prefixes with feat: [WIP] if no type is found)
                    if [[ ! "$ORIGINAL_TITLE" =~ ^(feat|fix|chore|docs|style|refactor|perf|test|ci|build|revert): ]]; then
                    gh pr edit "$PR_URL" --title "feat: [WIP] $ORIGINAL_TITLE"
                    else
                    gh pr edit "$PR_URL" --title "[WIP] $ORIGINAL_TITLE"
                    fi
