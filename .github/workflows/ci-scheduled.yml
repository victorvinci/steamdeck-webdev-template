# Scheduled CI jobs for steamdeck-webdev-template.
#
# Lives separately from ci.yml so the push/PR pipeline stays focused on
# gating jobs. All jobs here run on a weekly cron and are also exposed via
# workflow_dispatch so they can be reproduced on demand.
#
# Free-tier minute budget:
#   The whole file is designed to fit in a single weekly slot (~15–20 min
#   total) so the cron run is essentially free. Schedules are staggered so
#   they don't all start at once if the runner picks them up sequentially.
#
# Action pinning policy:
#   See ci.yml header. Pins are SHA + `# vX` comment for Renovate.

name: CI (scheduled)

on:
    schedule:
        - cron: '23 5 * * 1' # weekly Monday 05:23 UTC
    workflow_dispatch:

# Two back-to-back `workflow_dispatch` runs (or a dispatch overlapping the
# weekly cron) would otherwise race on the same tracking issues — each
# job ends with an issue `create`/`update`, and two concurrent scripts
# can clobber each other's bodies. `cancel-in-progress: true` drops the
# older run the moment a newer one starts. Every job here is idempotent
# (scanners re-run, issues are upsert-by-label), so cancellation is
# safe — the next run will re-compute from scratch.
concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    HUSKY: '0'
    # Opt in to Node.js 24 for JavaScript actions ahead of the June 2026
    # forced cutover. See ci.yml for the full rationale.
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    # Kill switch for Nx Cloud. When the `NX_CLOUD_ENABLED` repo variable
    # is anything other than 'true' (e.g. we're out of free-plan credits),
    # set NX_NO_CLOUD=true so nx skips cloud entirely regardless of the
    # nxCloudId in nx.json. Blanking the token alone is not enough — nx
    # still tries to auth using the workspace's nxCloudId. Flip the
    # variable back to 'true' in repo Settings → Variables when credits
    # reset.
    NX_CLOUD_ACCESS_TOKEN: ${{ vars.NX_CLOUD_ENABLED == 'true' && secrets.NX_CLOUD_ACCESS_TOKEN || '' }}
    NX_NO_CLOUD: ${{ vars.NX_CLOUD_ENABLED == 'true' && 'false' || 'true' }}

jobs:
    # ---------- dependency health rollup ----------
    #
    # npm audit + license scan + outdated deps were three parallel jobs.
    # They each spent ~20s spinning up a runner and another ~30s on
    # checkout + setup-node-deps before doing ~5s of real work. Merged
    # into one serial job they share the cold-start cost once, saving
    # ~2–3 min of billable time per weekly run on free tier.

    dep-health:
        name: dep health (audit / license / outdated)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            issues: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: ./.github/actions/setup-node-deps

            # --- npm audit ---
            # Capture machine-readable output for the issue body, but also
            # print the human-readable summary to the job log. We intentionally
            # do NOT fail the job on findings — the tracking issue is the
            # signal, not a red ❌ on a cron run nobody looks at.
            - name: Run npm audit
              id: audit
              run: |
                  set +e
                  npm audit --audit-level=high --omit=dev --json > audit.json
                  echo "exit_code=$?" >> "$GITHUB_OUTPUT"
                  npm audit --audit-level=high --omit=dev || true

            - name: Open or update tracking issue
              if: steps.audit.outputs.exit_code != '0'
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              with:
                  script: |
                      const fs = require('fs');
                      const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
                      const meta = audit.metadata?.vulnerabilities ?? {};
                      const high = (meta.high ?? 0) + (meta.critical ?? 0);
                      if (high === 0) {
                          core.info('No high/critical vulnerabilities — not filing issue.');
                          return;
                      }

                      const label = 'npm-audit';
                      const title = `npm audit: ${high} high/critical vulnerabilit${high === 1 ? 'y' : 'ies'} in production deps`;

                      const advisories = Object.values(audit.vulnerabilities ?? {})
                          .filter(v => v.severity === 'high' || v.severity === 'critical')
                          .map(v => {
                              const titles = (v.via ?? [])
                                  .map(x => typeof x === 'string' ? x : x.title)
                                  .filter(Boolean)
                                  .join(', ');
                              return `- **${v.name}** (${v.severity})${titles ? ` — ${titles}` : ''}`;
                          })
                          .join('\n');

                      const body = [
                          `Weekly \`npm audit --audit-level=high --omit=dev\` found vulnerabilities in production dependencies.`,
                          ``,
                          `**Counts:** critical=${meta.critical ?? 0}, high=${meta.high ?? 0}, moderate=${meta.moderate ?? 0}, low=${meta.low ?? 0}`,
                          ``,
                          `## Affected packages`,
                          advisories || '_(see workflow logs)_',
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                          ``,
                          `Auto-filed by \`.github/workflows/ci-scheduled.yml\`. This issue is updated in place each week — close it when the underlying advisories are resolved and a fresh run will reopen a new one only if findings reappear.`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo,
                              name: label,
                              color: 'b60205',
                              description: 'Tracking issue from weekly npm audit',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo,
                          state: 'open',
                          labels: label,
                          per_page: 10,
                      });

                      if (existing.data.length > 0) {
                          const issue = existing.data[0];
                          await github.rest.issues.update({
                              ...context.repo,
                              issue_number: issue.number,
                              title,
                              body,
                          });
                          core.notice(`Updated tracking issue #${issue.number}`);
                      } else {
                          const created = await github.rest.issues.create({
                              ...context.repo,
                              title,
                              body,
                              labels: [label, 'security'],
                          });
                          core.notice(`Filed tracking issue #${created.data.number}`);
                      }

            # --- license scan ---
            # Catches accidentally introduced GPL/AGPL/LGPL transitive
            # deps, which are incompatible with most commercial use.
            # Two failure modes are handled separately:
            #   - Scanner exited 0 and found offenders → file/update the
            #     `license-scan` tracking issue (the normal signal).
            #   - Scanner exited non-zero (registry flake, npx install
            #     failure, etc.) → file/update a separate
            #     `license-scan-error` issue. We do NOT touch the normal
            #     `license-scan` issue in this case because we can't tell
            #     whether a real finding was masked — close-stale logic
            #     only runs when the scanner itself is trustworthy.
            - name: Run license-checker
              id: lc
              run: |
                  set +e
                  npx --yes license-checker-rseidelsohn@4.4.2 \
                      --production \
                      --json \
                      --excludePrivatePackages \
                      > licenses.json
                  echo "exit_code=$?" >> "$GITHUB_OUTPUT"
                  # Human summary
                  npx --yes license-checker-rseidelsohn@4.4.2 \
                      --production \
                      --summary \
                      --excludePrivatePackages || true

            - name: Open or update tracking issue
              if: always()
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              env:
                  LC_EXIT_CODE: ${{ steps.lc.outputs.exit_code }}
              with:
                  script: |
                      const fs = require('fs');

                      // Scanner failed to produce output — file a separate
                      // `license-scan-error` issue and stop. Leaving the
                      // normal `license-scan` issue alone is deliberate: a
                      // broken scanner ≠ "no offenders", so we must not
                      // close a stale finding just because the run errored.
                      const lcExit = process.env.LC_EXIT_CODE;
                      if (lcExit !== '0') {
                          const errLabel = 'license-scan-error';
                          const errTitle = `license scan: scanner errored (exit code ${lcExit})`;
                          const errBody = [
                              `Weekly license-checker run failed to execute (exit code \`${lcExit}\`). This is usually a transient registry/network issue; re-run the workflow manually once before worrying.`,
                              ``,
                              `A failed scan does **not** mean "no offenders" — it means the scanner did not finish, so the normal \`license-scan\` tracking issue has intentionally been left untouched.`,
                              ``,
                              `---`,
                              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                              ``,
                              `Auto-filed by \`.github/workflows/ci-scheduled.yml\`.`,
                          ].join('\n');

                          try {
                              await github.rest.issues.getLabel({ ...context.repo, name: errLabel });
                          } catch {
                              await github.rest.issues.createLabel({
                                  ...context.repo, name: errLabel, color: 'd93f0b',
                                  description: 'Weekly license scanner failed to execute',
                              });
                          }

                          const existingErr = await github.rest.issues.listForRepo({
                              ...context.repo, state: 'open', labels: errLabel, per_page: 10,
                          });
                          if (existingErr.data.length > 0) {
                              await github.rest.issues.update({
                                  ...context.repo, issue_number: existingErr.data[0].number, title: errTitle, body: errBody,
                              });
                          } else {
                              await github.rest.issues.create({
                                  ...context.repo, title: errTitle, body: errBody, labels: [errLabel, 'ci'],
                              });
                          }
                          core.setFailed(`license-checker exited ${lcExit}; see license-scan-error tracking issue`);
                          return;
                      }

                      // Scanner succeeded — close any open scanner-error
                      // issue (it was a prior week's transient failure),
                      // then run the normal offender-finding flow.
                      const errLabel = 'license-scan-error';
                      const staleErr = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: errLabel, per_page: 10,
                      });
                      for (const issue of staleErr.data) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: issue.number, state: 'closed',
                          });
                          core.notice(`Closed resolved license-scan-error issue #${issue.number}`);
                      }

                      const data = JSON.parse(fs.readFileSync('licenses.json', 'utf8'));

                      // Anything matching these is flagged. Keep the list tight
                      // — every false positive trains people to ignore the issue.
                      const blocked = /^(GPL|AGPL|LGPL|SSPL|CC-BY-NC|EUPL)/i;

                      const offenders = Object.entries(data)
                          .filter(([, info]) => {
                              const lic = String(info.licenses ?? '');
                              return blocked.test(lic);
                          })
                          .map(([pkg, info]) => `- **${pkg}** — \`${info.licenses}\``)
                          .sort();

                      if (offenders.length === 0) {
                          core.info('No copyleft licenses in production deps.');
                          // Close any stale tracking issue — finding is resolved.
                          const stale = await github.rest.issues.listForRepo({
                              ...context.repo, state: 'open', labels: 'license-scan', per_page: 10,
                          });
                          for (const issue of stale.data) {
                              await github.rest.issues.update({
                                  ...context.repo, issue_number: issue.number, state: 'closed',
                              });
                              core.notice(`Closed resolved license issue #${issue.number}`);
                          }
                          return;
                      }

                      const label = 'license-scan';
                      const title = `license scan: ${offenders.length} copyleft package${offenders.length === 1 ? '' : 's'} in production deps`;
                      const body = [
                          `Weekly license scan found copyleft (or otherwise restricted) licenses in production dependencies. These are incompatible with most commercial use and should be replaced or moved to devDependencies.`,
                          ``,
                          `## Offenders`,
                          offenders.join('\n'),
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                          ``,
                          `Auto-filed by \`.github/workflows/ci-scheduled.yml\`.`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo, name: label, color: 'd93f0b',
                              description: 'Tracking issue from weekly license scan',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: label, per_page: 10,
                      });
                      if (existing.data.length > 0) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: existing.data[0].number, title, body,
                          });
                          core.notice(`Updated license issue #${existing.data[0].number}`);
                      } else {
                          const created = await github.rest.issues.create({
                              ...context.repo, title, body, labels: [label, 'security'],
                          });
                          core.notice(`Filed license issue #${created.data.number}`);
                      }

            # --- outdated prod deps rollup ---
            # Renovate already opens PRs for outdated deps. This is a
            # single rollup view so you can see overall drift at a
            # glance without scrolling through Renovate's PR list.
            - name: npm outdated --json
              id: out
              run: |
                  set +e
                  npm outdated --json --omit=dev > outdated.json
                  # npm outdated exits 1 when anything is outdated; that is a
                  # signal, not an error. Always emit valid JSON.
                  if [ ! -s outdated.json ]; then echo '{}' > outdated.json; fi
                  set -e

            - name: Open or update tracking issue
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              with:
                  script: |
                      const fs = require('fs');
                      const data = JSON.parse(fs.readFileSync('outdated.json', 'utf8'));
                      const entries = Object.entries(data);

                      const label = 'outdated-deps';

                      // Resolve the tracking issue when the tree is clean.
                      if (entries.length === 0) {
                          core.info('No outdated prod deps.');
                          const stale = await github.rest.issues.listForRepo({
                              ...context.repo, state: 'open', labels: label, per_page: 10,
                          });
                          for (const issue of stale.data) {
                              await github.rest.issues.update({
                                  ...context.repo, issue_number: issue.number, state: 'closed',
                              });
                          }
                          return;
                      }

                      const major = entries.filter(([, v]) => {
                          const cur = (v.current || '').split('.')[0];
                          const lat = (v.latest || '').split('.')[0];
                          return cur && lat && cur !== lat;
                      });

                      const rows = entries
                          .map(([name, v]) => `| \`${name}\` | ${v.current ?? '—'} | ${v.wanted ?? '—'} | ${v.latest ?? '—'} |`)
                          .sort()
                          .join('\n');

                      const title = `outdated prod deps: ${entries.length} package${entries.length === 1 ? '' : 's'} (${major.length} major)`;
                      const body = [
                          `Weekly rollup of outdated production dependencies. Renovate opens individual PRs — this is a single view so you can see overall drift.`,
                          ``,
                          `**Total:** ${entries.length} • **Major behind:** ${major.length}`,
                          ``,
                          `| Package | Current | Wanted | Latest |`,
                          `|---|---|---|---|`,
                          rows,
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo, name: label, color: 'fbca04',
                              description: 'Weekly rollup of outdated production deps',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: label, per_page: 10,
                      });
                      if (existing.data.length > 0) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: existing.data[0].number, title, body,
                          });
                      } else {
                          await github.rest.issues.create({
                              ...context.repo, title, body, labels: [label, 'dependencies'],
                          });
                      }

    # ---------- frontend perf (bundle size + lighthouse) ----------
    #
    # Builds the frontend once and runs both the bundle-size budget check
    # and Lighthouse against the same dist. Lighthouse used to run on
    # every push in ci.yml with `continue-on-error: true`, which meant it
    # never actually gated anything — pure minute burn. Moved here so
    # perf regressions still surface (via the tracking issue) on a cadence
    # that matters, without paying for it on every PR.
    bundle-size:
        name: frontend perf (bundle size + lighthouse)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            issues: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: ./.github/actions/setup-node-deps

            - name: Build frontend
              env:
                  # Vite inlines VITE_* at build time. Without this, the
                  # frontend Zod env check throws on first script eval and
                  # lighthouse fails with NO_FCP because the page never
                  # paints. Value is irrelevant for the static lighthouse
                  # run — it just has to satisfy z.string().url().
                  VITE_API_URL: http://localhost:3000
              run: npx nx run frontend:build

            - name: Measure gzipped bundle
              id: size
              run: |
                  set -e
                  TOTAL=0
                  while IFS= read -r f; do
                      [ -f "$f" ] || continue
                      SZ=$(gzip -c "$f" | wc -c)
                      TOTAL=$((TOTAL + SZ))
                  done < <(find dist -type f \( -name '*.js' -o -name '*.css' \))
                  echo "total_bytes=$TOTAL" >> "$GITHUB_OUTPUT"
                  echo "Total gzipped JS+CSS: $TOTAL bytes ($(awk "BEGIN { printf \"%.1f\", $TOTAL / 1024 }") KiB)"

            - name: Compare to baseline
              id: cmp
              env:
                  CURRENT: ${{ steps.size.outputs.total_bytes }}
              run: |
                  BASELINE_FILE=.github/bundle-size-baseline.json
                  if [ ! -f "$BASELINE_FILE" ]; then
                      echo "status=no_baseline" >> "$GITHUB_OUTPUT"
                      echo "No baseline at $BASELINE_FILE — first run reports current size only."
                      echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
                      echo "baseline=0" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi
                  BASELINE=$(python3 -c "import json; print(json.load(open('$BASELINE_FILE'))['gzipped_bytes'])")
                  THRESHOLD=$(python3 -c "print(int($BASELINE * 1.10))")
                  echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
                  echo "baseline=$BASELINE" >> "$GITHUB_OUTPUT"
                  if [ "$CURRENT" -gt "$THRESHOLD" ]; then
                      echo "status=regression" >> "$GITHUB_OUTPUT"
                  else
                      echo "status=ok" >> "$GITHUB_OUTPUT"
                  fi

            - name: Open or update tracking issue
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              env:
                  STATUS: ${{ steps.cmp.outputs.status }}
                  CURRENT: ${{ steps.cmp.outputs.current }}
                  BASELINE: ${{ steps.cmp.outputs.baseline }}
              with:
                  script: |
                      const label = 'bundle-size';
                      const status = process.env.STATUS;
                      const current = parseInt(process.env.CURRENT, 10);
                      const baseline = parseInt(process.env.BASELINE, 10);
                      const kib = (n) => `${(n / 1024).toFixed(1)} KiB`;

                      // Only file an issue on actual regression. no_baseline
                      // and ok are silent (current size still in the run log).
                      if (status !== 'regression') {
                          core.info(`Bundle size status: ${status} — no issue filed.`);
                          // Resolve any open issue from a prior regression.
                          const stale = await github.rest.issues.listForRepo({
                              ...context.repo, state: 'open', labels: label, per_page: 10,
                          });
                          for (const issue of stale.data) {
                              await github.rest.issues.update({
                                  ...context.repo, issue_number: issue.number, state: 'closed',
                              });
                          }
                          return;
                      }

                      const pct = ((current - baseline) / baseline) * 100;
                      const title = `bundle size: frontend grew ${pct.toFixed(1)}% over baseline`;
                      const body = [
                          `Weekly bundle-size check exceeded the baseline by more than 10%.`,
                          ``,
                          `| | Bytes | Pretty |`,
                          `|---|---|---|`,
                          `| Current  | ${current}  | ${kib(current)}  |`,
                          `| Baseline | ${baseline} | ${kib(baseline)} |`,
                          `| Delta    | +${current - baseline} | +${pct.toFixed(1)}% |`,
                          ``,
                          `If the growth is intentional, bump \`.github/bundle-size-baseline.json\` in a PR. Otherwise investigate which dependency or chunk grew.`,
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo, name: label, color: '5319e7',
                              description: 'Frontend bundle exceeded the size baseline',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: label, per_page: 10,
                      });
                      if (existing.data.length > 0) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: existing.data[0].number, title, body,
                          });
                      } else {
                          await github.rest.issues.create({
                              ...context.repo, title, body, labels: [label, 'performance'],
                          });
                      }

            # --- lighthouse ---
            # Reuses the `dist` from the bundle-size build above. Runs
            # against the already-built frontend so we don't pay for a
            # second `nx run frontend:build`. lhci assertions come from
            # lighthouserc.json. "loud failure on a weekly cron run"
            # is functionally "no failure" for a solo maintainer, so
            # we also file a tracking issue on assertion failure (same
            # pattern as bundle-size / license-scan). The step's exit
            # status stays red — the issue is the durable signal.
            - name: Run Lighthouse CI
              id: lh
              run: |
                  set +e
                  npx --yes @lhci/cli@0.14.x autorun --config=./lighthouserc.json
                  echo "exit_code=$?" >> "$GITHUB_OUTPUT"

            - name: Open or update tracking issue
              if: always() && steps.lh.outputs.exit_code != ''
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              env:
                  LH_EXIT_CODE: ${{ steps.lh.outputs.exit_code }}
              with:
                  script: |
                      const fs = require('fs');
                      const path = require('path');

                      const label = 'lighthouse';
                      const lhExit = process.env.LH_EXIT_CODE;

                      // Scanner succeeded — close any stale tracking issue.
                      if (lhExit === '0') {
                          core.info('Lighthouse passed all assertions.');
                          const stale = await github.rest.issues.listForRepo({
                              ...context.repo, state: 'open', labels: label, per_page: 10,
                          });
                          for (const issue of stale.data) {
                              await github.rest.issues.update({
                                  ...context.repo, issue_number: issue.number, state: 'closed',
                              });
                              core.notice(`Closed resolved lighthouse issue #${issue.number}`);
                          }
                          return;
                      }

                      // Assertion failure — pull the failing categories out of
                      // the lhci manifest if it exists. lhci writes
                      // `.lighthouseci/assertion-results.json` on failure with
                      // { url, auditId, actual, expected, level, ... } entries.
                      let offenders = '_(see workflow logs — no `assertion-results.json` produced)_';
                      const resultsFile = path.join('.lighthouseci', 'assertion-results.json');
                      try {
                          const results = JSON.parse(fs.readFileSync(resultsFile, 'utf8'));
                          const failed = results.filter(r => r.level === 'error');
                          if (failed.length > 0) {
                              offenders = failed
                                  .map(r => `- **${r.auditId}** (${r.url}) — actual \`${r.actual}\`, expected ${r.operator ?? ''} \`${r.expected}\``)
                                  .join('\n');
                          }
                      } catch (e) {
                          core.info(`Could not parse ${resultsFile}: ${e.message}`);
                      }

                      const title = `lighthouse: frontend failed perf assertions`;
                      const body = [
                          `Weekly Lighthouse CI run failed one or more assertions defined in \`lighthouserc.json\`.`,
                          ``,
                          `## Failing audits`,
                          offenders,
                          ``,
                          `If the regression is intentional (e.g. you relaxed an assertion on purpose), update \`lighthouserc.json\` in a PR. Otherwise investigate the regression — the full Lighthouse report is attached as the \`lighthouseci\` workflow artifact.`,
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                          ``,
                          `Auto-filed by \`.github/workflows/ci-scheduled.yml\`.`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo, name: label, color: '5319e7',
                              description: 'Tracking issue from weekly Lighthouse CI run',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: label, per_page: 10,
                      });
                      if (existing.data.length > 0) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: existing.data[0].number, title, body,
                          });
                          core.notice(`Updated lighthouse issue #${existing.data[0].number}`);
                      } else {
                          const created = await github.rest.issues.create({
                              ...context.repo, title, body, labels: [label, 'performance'],
                          });
                          core.notice(`Filed lighthouse issue #${created.data.number}`);
                      }

            - name: Re-raise Lighthouse failure
              if: always() && steps.lh.outputs.exit_code != '' && steps.lh.outputs.exit_code != '0'
              run: |
                  echo "Lighthouse CI exited ${{ steps.lh.outputs.exit_code }}; see lighthouse tracking issue." >&2
                  exit 1

            - if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: lighthouseci
                  path: .lighthouseci
                  if-no-files-found: ignore
                  retention-days: 30

    # ---------- stale branch sweep ----------

    # Lists branches with no commits in the last 90 days (excluding main /
    # develop) and files a single tracking issue listing them. Pure janitor
    # job — no auto-deletion.
    stale-branches:
        name: stale branch sweep
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
            issues: write
        steps:
            - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              with:
                  script: |
                      const protectedBranches = new Set(['main', 'develop']);
                      const cutoff = Date.now() - 90 * 24 * 60 * 60 * 1000;

                      const branches = await github.paginate(github.rest.repos.listBranches, {
                          ...context.repo, per_page: 100,
                      });

                      const stale = [];
                      for (const b of branches) {
                          if (protectedBranches.has(b.name)) continue;
                          const commit = await github.rest.repos.getCommit({
                              ...context.repo, ref: b.commit.sha,
                          });
                          const date = new Date(commit.data.commit.committer.date);
                          if (date.getTime() < cutoff) {
                              stale.push({ name: b.name, date: date.toISOString().slice(0, 10) });
                          }
                      }

                      const label = 'stale-branches';

                      if (stale.length === 0) {
                          core.info('No stale branches.');
                          const open = await github.rest.issues.listForRepo({
                              ...context.repo, state: 'open', labels: label, per_page: 10,
                          });
                          for (const issue of open.data) {
                              await github.rest.issues.update({
                                  ...context.repo, issue_number: issue.number, state: 'closed',
                              });
                          }
                          return;
                      }

                      stale.sort((a, b) => a.date.localeCompare(b.date));
                      const rows = stale.map(b => `- \`${b.name}\` — last commit ${b.date}`).join('\n');
                      const title = `stale branches: ${stale.length} not touched in 90+ days`;
                      const body = [
                          `Weekly sweep of branches with no commits in the last 90 days. Review and delete the ones that are merged or abandoned.`,
                          ``,
                          rows,
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                          ``,
                          `Auto-filed by \`.github/workflows/ci-scheduled.yml\`. Branches are never auto-deleted.`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo, name: label, color: 'c2e0c6',
                              description: 'Branches with no recent activity',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: label, per_page: 10,
                      });
                      if (existing.data.length > 0) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: existing.data[0].number, title, body,
                          });
                      } else {
                          await github.rest.issues.create({
                              ...context.repo, title, body, labels: [label],
                          });
                      }

    # ---------- template rename self-test ----------
    #
    # Exercises `scripts/rename-template.sh` end-to-end on a fresh checkout
    # so we catch drift between the rename allowlist and the actual repo.
    # Failure modes this guards against:
    #
    #   1. Someone adds a new file containing the project name / GitHub
    #      owner / npm scope / maintainer email but forgets to add it to
    #      the script's allowlist. Result on a real fork: residual template
    #      strings ship with the renamed tree.
    #
    #   2. The script itself develops a regression (broken sed expression,
    #      dropped argument handling, etc.) that breaks `npm run check`
    #      after the rename.
    #
    # Runs on the weekly cron + workflow_dispatch only — not per PR — so
    # we don't pay ~5–10 min per change for a class of bug that surfaces
    # rarely. Tracking issue makes the cron failure visible without
    # relying on someone watching workflow runs.
    template-rename:
        name: template rename self-test
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
            issues: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: ./.github/actions/setup-node-deps

            # The script bails on a dirty worktree. Fresh `actions/checkout`
            # produces a clean tree, so the guard is satisfied without
            # --force-dirty. We still configure git identity in case any
            # downstream step (npm install hooks, etc.) tries to commit.
            - name: Configure git identity
              run: |
                  git config user.email "ci@example.com"
                  git config user.name "CI"

            - name: Run rename script with test arguments
              id: rename
              run: |
                  set +e
                  ./scripts/rename-template.sh \
                      --project-name     foo-fork \
                      --github-owner     alice \
                      --npm-scope        acme \
                      --maintainer-email alice@example.com
                  echo "exit_code=$?" >> "$GITHUB_OUTPUT"

            # The script's own `npm run format` + `npm run check` already
            # gate on a renamed tree being a valid build. This step adds
            # belt-and-suspenders: scan for residual template strings in
            # files the script's allowlist might be missing entirely.
            #
            # The scan logic lives in `scripts/scan-template-residuals.sh`
            # rather than inline here. That script is intentionally NOT
            # in `scripts/rename-template.sh`'s allowlist, so its literal
            # search patterns survive the rename and detect true
            # residuals. Inlining the patterns here would let the rename
            # rewrite them (this workflow file IS in the rename
            # allowlist), causing the scan to silently miss real
            # residuals while falsely flagging this file's own test-
            # invocation lines (`foo-fork`, `alice`, `acme`).
            #
            # Excluded from the scan (defined in the script): point-in-
            # time records (CHANGELOG, attribution log, security-audit
            # snapshots), the rename script and this scanner themselves,
            # `docs/FORK.md` and `docs/UPGRADE.md` which intentionally
            # reference the upstream template name.
            - name: Scan for residual template strings
              if: steps.rename.outputs.exit_code == '0'
              id: leftovers
              run: ./scripts/scan-template-residuals.sh

            - name: Open or update tracking issue on failure
              if: failure()
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              with:
                  script: |
                      const label = 'template-rename-drift';
                      const title = `template rename self-test: scripts/rename-template.sh out of sync with repo`;
                      const body = [
                          `Weekly template rename self-test failed. The script at \`scripts/rename-template.sh\` no longer produces a clean fork tree on the current \`develop\`.`,
                          ``,
                          `**Likely causes (in order of frequency):**`,
                          ``,
                          `1. A new file landed that contains \`steamdeck-webdev-template\`, \`@mcb/\`, \`victorvinci\`, or \`victorvinci@protonmail.com\` but isn't in the script's allowlist. The job logs name the file(s); add to the appropriate sed pass.`,
                          `2. The script itself has a regression (broken sed expression, missing argument). Run locally with \`./scripts/rename-template.sh ...\` to reproduce.`,
                          `3. \`npm run check\` no longer passes on a renamed tree because of an unrelated change. Reproduce with \`./scripts/rename-template.sh\` then look at the failing gate.`,
                          ``,
                          `Fix the script, push to a branch, re-run this workflow via **Actions → CI (scheduled) → Run workflow** to confirm green before closing this issue.`,
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                          ``,
                          `Auto-filed by \`.github/workflows/ci-scheduled.yml\`. Updated in place each week.`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo, name: label, color: 'b60205',
                              description: 'Template rename self-test detected drift between script and repo',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: label, per_page: 10,
                      });
                      if (existing.data.length > 0) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: existing.data[0].number, title, body,
                          });
                          core.notice(`Updated template-rename-drift issue #${existing.data[0].number}`);
                      } else {
                          const created = await github.rest.issues.create({
                              ...context.repo, title, body, labels: [label, 'ci'],
                          });
                          core.notice(`Filed template-rename-drift issue #${created.data.number}`);
                      }

            - name: Close tracking issue on success
              if: success()
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              with:
                  script: |
                      const label = 'template-rename-drift';
                      const stale = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: label, per_page: 10,
                      });
                      for (const issue of stale.data) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: issue.number, state: 'closed',
                          });
                          core.notice(`Closed resolved template-rename-drift issue #${issue.number}`);
                      }
