# Scheduled CI jobs for steamdeck-webdev-template.
#
# Lives separately from ci.yml so the push/PR pipeline stays focused on
# gating jobs. All jobs here run on a weekly cron and are also exposed via
# workflow_dispatch so they can be reproduced on demand.
#
# Free-tier minute budget:
#   The whole file is designed to fit in a single weekly slot (~15–20 min
#   total) so the cron run is essentially free. Schedules are staggered so
#   they don't all start at once if the runner picks them up sequentially.
#
# Action pinning policy:
#   See ci.yml header. Pins are SHA + `# vX` comment for Renovate.

name: CI (scheduled)

on:
    schedule:
        - cron: '23 5 * * 1' # weekly Monday 05:23 UTC
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

permissions:
    contents: read

env:
    HUSKY: '0'

jobs:
    # ---------- npm audit (high/critical, prod-only) ----------

    npm-audit:
        name: npm audit (high, prod-only)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            issues: write # to file/update the tracking issue on findings
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: ./.github/actions/setup-node-deps

            # Capture machine-readable output for the issue body, but also
            # print the human-readable summary to the job log. We intentionally
            # do NOT fail the job on findings — the tracking issue is the
            # signal, not a red ❌ on a cron run nobody looks at.
            - name: Run npm audit
              id: audit
              run: |
                  set +e
                  npm audit --audit-level=high --omit=dev --json > audit.json
                  echo "exit_code=$?" >> "$GITHUB_OUTPUT"
                  npm audit --audit-level=high --omit=dev || true

            - name: Open or update tracking issue
              if: steps.audit.outputs.exit_code != '0'
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              with:
                  script: |
                      const fs = require('fs');
                      const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
                      const meta = audit.metadata?.vulnerabilities ?? {};
                      const high = (meta.high ?? 0) + (meta.critical ?? 0);
                      if (high === 0) {
                          core.info('No high/critical vulnerabilities — not filing issue.');
                          return;
                      }

                      const label = 'npm-audit';
                      const title = `npm audit: ${high} high/critical vulnerabilit${high === 1 ? 'y' : 'ies'} in production deps`;

                      const advisories = Object.values(audit.vulnerabilities ?? {})
                          .filter(v => v.severity === 'high' || v.severity === 'critical')
                          .map(v => {
                              const titles = (v.via ?? [])
                                  .map(x => typeof x === 'string' ? x : x.title)
                                  .filter(Boolean)
                                  .join(', ');
                              return `- **${v.name}** (${v.severity})${titles ? ` — ${titles}` : ''}`;
                          })
                          .join('\n');

                      const body = [
                          `Weekly \`npm audit --audit-level=high --omit=dev\` found vulnerabilities in production dependencies.`,
                          ``,
                          `**Counts:** critical=${meta.critical ?? 0}, high=${meta.high ?? 0}, moderate=${meta.moderate ?? 0}, low=${meta.low ?? 0}`,
                          ``,
                          `## Affected packages`,
                          advisories || '_(see workflow logs)_',
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                          ``,
                          `Auto-filed by \`.github/workflows/ci-scheduled.yml\`. This issue is updated in place each week — close it when the underlying advisories are resolved and a fresh run will reopen a new one only if findings reappear.`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo,
                              name: label,
                              color: 'b60205',
                              description: 'Tracking issue from weekly npm audit',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo,
                          state: 'open',
                          labels: label,
                          per_page: 10,
                      });

                      if (existing.data.length > 0) {
                          const issue = existing.data[0];
                          await github.rest.issues.update({
                              ...context.repo,
                              issue_number: issue.number,
                              title,
                              body,
                          });
                          core.notice(`Updated tracking issue #${issue.number}`);
                      } else {
                          const created = await github.rest.issues.create({
                              ...context.repo,
                              title,
                              body,
                              labels: [label, 'security'],
                          });
                          core.notice(`Filed tracking issue #${created.data.number}`);
                      }

    # ---------- license scan (prod deps) ----------

    # Catches accidentally introduced GPL/AGPL/LGPL transitive deps, which
    # are incompatible with most commercial use. Fails soft to a tracking
    # issue, same pattern as npm-audit.
    license-scan:
        name: license scan (prod deps)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            issues: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: ./.github/actions/setup-node-deps

            - name: Run license-checker
              id: lc
              run: |
                  set +e
                  npx --yes license-checker-rseidelsohn@4.4.2 \
                      --production \
                      --json \
                      --excludePrivatePackages \
                      > licenses.json
                  echo "exit_code=$?" >> "$GITHUB_OUTPUT"
                  # Human summary
                  npx --yes license-checker-rseidelsohn@4.4.2 \
                      --production \
                      --summary \
                      --excludePrivatePackages || true

            - name: Open or update tracking issue
              if: steps.lc.outputs.exit_code == '0'
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              with:
                  script: |
                      const fs = require('fs');
                      const data = JSON.parse(fs.readFileSync('licenses.json', 'utf8'));

                      // Anything matching these is flagged. Keep the list tight
                      // — every false positive trains people to ignore the issue.
                      const blocked = /^(GPL|AGPL|LGPL|SSPL|CC-BY-NC|EUPL)/i;

                      const offenders = Object.entries(data)
                          .filter(([, info]) => {
                              const lic = String(info.licenses ?? '');
                              return blocked.test(lic);
                          })
                          .map(([pkg, info]) => `- **${pkg}** — \`${info.licenses}\``)
                          .sort();

                      if (offenders.length === 0) {
                          core.info('No copyleft licenses in production deps.');
                          // Close any stale tracking issue — finding is resolved.
                          const stale = await github.rest.issues.listForRepo({
                              ...context.repo, state: 'open', labels: 'license-scan', per_page: 10,
                          });
                          for (const issue of stale.data) {
                              await github.rest.issues.update({
                                  ...context.repo, issue_number: issue.number, state: 'closed',
                              });
                              core.notice(`Closed resolved license issue #${issue.number}`);
                          }
                          return;
                      }

                      const label = 'license-scan';
                      const title = `license scan: ${offenders.length} copyleft package${offenders.length === 1 ? '' : 's'} in production deps`;
                      const body = [
                          `Weekly license scan found copyleft (or otherwise restricted) licenses in production dependencies. These are incompatible with most commercial use and should be replaced or moved to devDependencies.`,
                          ``,
                          `## Offenders`,
                          offenders.join('\n'),
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                          ``,
                          `Auto-filed by \`.github/workflows/ci-scheduled.yml\`.`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo, name: label, color: 'd93f0b',
                              description: 'Tracking issue from weekly license scan',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: label, per_page: 10,
                      });
                      if (existing.data.length > 0) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: existing.data[0].number, title, body,
                          });
                          core.notice(`Updated license issue #${existing.data[0].number}`);
                      } else {
                          const created = await github.rest.issues.create({
                              ...context.repo, title, body, labels: [label, 'security'],
                          });
                          core.notice(`Filed license issue #${created.data.number}`);
                      }

    # ---------- outdated prod deps rollup ----------

    # Renovate already opens PRs for outdated deps. This job exists as a
    # single rollup view so you can see at a glance how stale the prod
    # dependency tree is, without scrolling through Renovate's PR list.
    outdated-deps:
        name: outdated prod deps
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
            issues: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: ./.github/actions/setup-node-deps

            - name: npm outdated --json
              id: out
              run: |
                  set +e
                  npm outdated --json --omit=dev > outdated.json
                  # npm outdated exits 1 when anything is outdated; that is a
                  # signal, not an error. Always emit valid JSON.
                  if [ ! -s outdated.json ]; then echo '{}' > outdated.json; fi
                  set -e

            - name: Open or update tracking issue
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              with:
                  script: |
                      const fs = require('fs');
                      const data = JSON.parse(fs.readFileSync('outdated.json', 'utf8'));
                      const entries = Object.entries(data);

                      const label = 'outdated-deps';

                      // Resolve the tracking issue when the tree is clean.
                      if (entries.length === 0) {
                          core.info('No outdated prod deps.');
                          const stale = await github.rest.issues.listForRepo({
                              ...context.repo, state: 'open', labels: label, per_page: 10,
                          });
                          for (const issue of stale.data) {
                              await github.rest.issues.update({
                                  ...context.repo, issue_number: issue.number, state: 'closed',
                              });
                          }
                          return;
                      }

                      const major = entries.filter(([, v]) => {
                          const cur = (v.current || '').split('.')[0];
                          const lat = (v.latest || '').split('.')[0];
                          return cur && lat && cur !== lat;
                      });

                      const rows = entries
                          .map(([name, v]) => `| \`${name}\` | ${v.current ?? '—'} | ${v.wanted ?? '—'} | ${v.latest ?? '—'} |`)
                          .sort()
                          .join('\n');

                      const title = `outdated prod deps: ${entries.length} package${entries.length === 1 ? '' : 's'} (${major.length} major)`;
                      const body = [
                          `Weekly rollup of outdated production dependencies. Renovate opens individual PRs — this is a single view so you can see overall drift.`,
                          ``,
                          `**Total:** ${entries.length} • **Major behind:** ${major.length}`,
                          ``,
                          `| Package | Current | Wanted | Latest |`,
                          `|---|---|---|---|`,
                          rows,
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo, name: label, color: 'fbca04',
                              description: 'Weekly rollup of outdated production deps',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: label, per_page: 10,
                      });
                      if (existing.data.length > 0) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: existing.data[0].number, title, body,
                          });
                      } else {
                          await github.rest.issues.create({
                              ...context.repo, title, body, labels: [label, 'dependencies'],
                          });
                      }

    # ---------- bundle size budget ----------

    # Builds the frontend, computes total gzipped JS+CSS size, and compares
    # against `.github/bundle-size-baseline.json`. Files an issue if the
    # current size exceeds the baseline by >10%. The baseline is hand-
    # maintained: bump it in a PR after an intentional growth.
    bundle-size:
        name: bundle size budget
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            issues: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: ./.github/actions/setup-node-deps

            - name: Build frontend
              run: npx nx run frontend:build

            - name: Measure gzipped bundle
              id: size
              run: |
                  set -e
                  TOTAL=0
                  while IFS= read -r f; do
                      [ -f "$f" ] || continue
                      SZ=$(gzip -c "$f" | wc -c)
                      TOTAL=$((TOTAL + SZ))
                  done < <(find dist -type f \( -name '*.js' -o -name '*.css' \))
                  echo "total_bytes=$TOTAL" >> "$GITHUB_OUTPUT"
                  echo "Total gzipped JS+CSS: $TOTAL bytes ($(awk "BEGIN { printf \"%.1f\", $TOTAL / 1024 }") KiB)"

            - name: Compare to baseline
              id: cmp
              env:
                  CURRENT: ${{ steps.size.outputs.total_bytes }}
              run: |
                  BASELINE_FILE=.github/bundle-size-baseline.json
                  if [ ! -f "$BASELINE_FILE" ]; then
                      echo "status=no_baseline" >> "$GITHUB_OUTPUT"
                      echo "No baseline at $BASELINE_FILE — first run reports current size only."
                      echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
                      echo "baseline=0" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi
                  BASELINE=$(python3 -c "import json; print(json.load(open('$BASELINE_FILE'))['gzipped_bytes'])")
                  THRESHOLD=$(python3 -c "print(int($BASELINE * 1.10))")
                  echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
                  echo "baseline=$BASELINE" >> "$GITHUB_OUTPUT"
                  if [ "$CURRENT" -gt "$THRESHOLD" ]; then
                      echo "status=regression" >> "$GITHUB_OUTPUT"
                  else
                      echo "status=ok" >> "$GITHUB_OUTPUT"
                  fi

            - name: Open or update tracking issue
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              env:
                  STATUS: ${{ steps.cmp.outputs.status }}
                  CURRENT: ${{ steps.cmp.outputs.current }}
                  BASELINE: ${{ steps.cmp.outputs.baseline }}
              with:
                  script: |
                      const label = 'bundle-size';
                      const status = process.env.STATUS;
                      const current = parseInt(process.env.CURRENT, 10);
                      const baseline = parseInt(process.env.BASELINE, 10);
                      const kib = (n) => `${(n / 1024).toFixed(1)} KiB`;

                      // Only file an issue on actual regression. no_baseline
                      // and ok are silent (current size still in the run log).
                      if (status !== 'regression') {
                          core.info(`Bundle size status: ${status} — no issue filed.`);
                          // Resolve any open issue from a prior regression.
                          const stale = await github.rest.issues.listForRepo({
                              ...context.repo, state: 'open', labels: label, per_page: 10,
                          });
                          for (const issue of stale.data) {
                              await github.rest.issues.update({
                                  ...context.repo, issue_number: issue.number, state: 'closed',
                              });
                          }
                          return;
                      }

                      const pct = ((current - baseline) / baseline) * 100;
                      const title = `bundle size: frontend grew ${pct.toFixed(1)}% over baseline`;
                      const body = [
                          `Weekly bundle-size check exceeded the baseline by more than 10%.`,
                          ``,
                          `| | Bytes | Pretty |`,
                          `|---|---|---|`,
                          `| Current  | ${current}  | ${kib(current)}  |`,
                          `| Baseline | ${baseline} | ${kib(baseline)} |`,
                          `| Delta    | +${current - baseline} | +${pct.toFixed(1)}% |`,
                          ``,
                          `If the growth is intentional, bump \`.github/bundle-size-baseline.json\` in a PR. Otherwise investigate which dependency or chunk grew.`,
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo, name: label, color: '5319e7',
                              description: 'Frontend bundle exceeded the size baseline',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: label, per_page: 10,
                      });
                      if (existing.data.length > 0) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: existing.data[0].number, title, body,
                          });
                      } else {
                          await github.rest.issues.create({
                              ...context.repo, title, body, labels: [label, 'performance'],
                          });
                      }

    # ---------- stale branch sweep ----------

    # Lists branches with no commits in the last 90 days (excluding main /
    # develop) and files a single tracking issue listing them. Pure janitor
    # job — no auto-deletion.
    stale-branches:
        name: stale branch sweep
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read
            issues: write
        steps:
            - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
              with:
                  script: |
                      const protectedBranches = new Set(['main', 'develop']);
                      const cutoff = Date.now() - 90 * 24 * 60 * 60 * 1000;

                      const branches = await github.paginate(github.rest.repos.listBranches, {
                          ...context.repo, per_page: 100,
                      });

                      const stale = [];
                      for (const b of branches) {
                          if (protectedBranches.has(b.name)) continue;
                          const commit = await github.rest.repos.getCommit({
                              ...context.repo, ref: b.commit.sha,
                          });
                          const date = new Date(commit.data.commit.committer.date);
                          if (date.getTime() < cutoff) {
                              stale.push({ name: b.name, date: date.toISOString().slice(0, 10) });
                          }
                      }

                      const label = 'stale-branches';

                      if (stale.length === 0) {
                          core.info('No stale branches.');
                          const open = await github.rest.issues.listForRepo({
                              ...context.repo, state: 'open', labels: label, per_page: 10,
                          });
                          for (const issue of open.data) {
                              await github.rest.issues.update({
                                  ...context.repo, issue_number: issue.number, state: 'closed',
                              });
                          }
                          return;
                      }

                      stale.sort((a, b) => a.date.localeCompare(b.date));
                      const rows = stale.map(b => `- \`${b.name}\` — last commit ${b.date}`).join('\n');
                      const title = `stale branches: ${stale.length} not touched in 90+ days`;
                      const body = [
                          `Weekly sweep of branches with no commits in the last 90 days. Review and delete the ones that are merged or abandoned.`,
                          ``,
                          rows,
                          ``,
                          `---`,
                          `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                          ``,
                          `Auto-filed by \`.github/workflows/ci-scheduled.yml\`. Branches are never auto-deleted.`,
                      ].join('\n');

                      try {
                          await github.rest.issues.getLabel({ ...context.repo, name: label });
                      } catch {
                          await github.rest.issues.createLabel({
                              ...context.repo, name: label, color: 'c2e0c6',
                              description: 'Branches with no recent activity',
                          });
                      }

                      const existing = await github.rest.issues.listForRepo({
                          ...context.repo, state: 'open', labels: label, per_page: 10,
                      });
                      if (existing.data.length > 0) {
                          await github.rest.issues.update({
                              ...context.repo, issue_number: existing.data[0].number, title, body,
                          });
                      } else {
                          await github.rest.issues.create({
                              ...context.repo, title, body, labels: [label],
                          });
                      }
