# Local MySQL for development. Override credentials via .env before `docker compose up`.
services:
    mysql:
        image: mysql:8.4
        container_name: mcb-mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        ports:
            - '${DB_PORT:-3306}:3306'
        volumes:
            - mcb-mysql-data:/var/lib/mysql
            - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_PASSWORD}']
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    mcb-mysql-data:
